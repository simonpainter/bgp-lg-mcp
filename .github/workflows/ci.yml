name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Lint with ruff
      run: |
        pip install ruff
        ruff check . || true
        ruff format --check . || true

    - name: Type check with mypy
      run: |
        pip install mypy
        mypy server.py bgp_client.py || true

    - name: Test server startup (HTTP mode)
      run: |
        python3 server.py > /tmp/server.log 2>&1 &
        SERVER_PID=$!
        sleep 3
        curl -s http://127.0.0.1:8000/health | grep -q "healthy" || exit 1
        kill $SERVER_PID || true
        echo "Server started successfully in HTTP mode"

    - name: Validate config.json
      run: |
        python3 -m json.tool config.json > /dev/null
        echo "config.json is valid JSON"

    - name: Test imports
      run: |
        python3 -c "import server; import bgp_client; print('All modules imported successfully')"

  security:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install security tools
      run: |
        python -m pip install --upgrade pip
        pip install bandit safety

    - name: Run Bandit security scan
      run: |
        bandit -r server.py bgp_client.py || true

    - name: Check dependencies for vulnerabilities
      run: |
        pip install -r requirements.txt
        safety check --json || true

  deploy-staging:
    needs: [test, security]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Build and prepare for deployment
      run: |
        echo "Building BGP Looking Glass MCP server for staging..."
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        echo "Build artifacts prepared"

    - name: Deploy to staging (Azure App Service)
      if: secrets.AZURE_STAGING_CREDENTIALS != ''
      run: |
        echo "Deployment to staging would happen here"
        echo "Set AZURE_STAGING_CREDENTIALS secret in GitHub Settings"
        echo "This is a placeholder - configure actual Azure deployment"

  deploy-production:
    needs: [test, security]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Build and prepare for deployment
      run: |
        echo "Building BGP Looking Glass MCP server for production..."
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        echo "Build artifacts prepared"

    - name: Deploy to production (Azure App Service)
      if: secrets.AZURE_PRODUCTION_CREDENTIALS != ''
      run: |
        echo "Deployment to production would happen here"
        echo "Set AZURE_PRODUCTION_CREDENTIALS secret in GitHub Settings"
        echo "This is a placeholder - configure actual Azure deployment"

    - name: Run smoke tests
      run: |
        echo "Running smoke tests against production..."
        echo "This is a placeholder for post-deployment verification"
